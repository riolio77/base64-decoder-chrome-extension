<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Base64 Decoder 설정</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
    font-size:13px; background:#fff; color:#202124;
    width:280px; min-height:100px;
  }
  .header {
    display:flex; align-items:center; gap:8px;
    padding:12px 14px 10px; background:#4285f4; color:#fff;
  }
  .header-icon { font-size:18px; }
  .header-title { font-size:14px; font-weight:700; }
  .header-ver { font-size:11px; opacity:.75; margin-left:auto; }
  .section { padding:14px 14px 0; }
  .section-title {
    font-size:11px; font-weight:700; color:#5f6368;
    text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px;
  }
  .desc { font-size:11.5px; color:#5f6368; line-height:1.55; margin-bottom:12px; }
  .toggle-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .toggle-label { font-size:13px; font-weight:500; }
  .switch { position:relative; display:inline-block; width:40px; height:22px; }
  .switch input { opacity:0; width:0; height:0; }
  .slider {
    position:absolute; inset:0; background:#ccc; border-radius:22px;
    cursor:pointer; transition:.25s;
  }
  .slider::before {
    content:''; position:absolute; height:16px; width:16px;
    left:3px; bottom:3px; background:#fff; border-radius:50%;
    transition:.25s; box-shadow:0 1px 3px rgba(0,0,0,.25);
  }
  input:checked + .slider { background:#4285f4; }
  input:checked + .slider::before { transform:translateX(18px); }
  #pwField { transition:opacity .2s; }
  .pw-row { display:flex; gap:6px; margin-bottom:8px; }
  .pw-input {
    flex:1; padding:7px 10px; font-size:13px;
    border:1px solid #dadce0; border-radius:5px; outline:none;
    transition:border-color .15s;
  }
  .pw-input:focus { border-color:#4285f4; }
  .eye-btn {
    padding:0 10px; background:#f1f3f4; border:1px solid #dadce0;
    border-radius:5px; cursor:pointer; font-size:15px; transition:background .15s;
  }
  .eye-btn:hover { background:#e8eaed; }
  .save-btn {
    width:100%; padding:8px; font-size:13px; font-weight:600;
    background:#4285f4; color:#fff; border:none; border-radius:5px; cursor:pointer;
    transition:filter .15s;
  }
  .save-btn:hover { filter:brightness(1.08); }
  .save-btn:active { filter:brightness(.95); }
  .status {
    font-size:12px; text-align:center; padding:0;
    max-height:0; overflow:hidden; opacity:0;
    transition:max-height .2s,opacity .2s,padding .2s;
    border-radius:4px; margin-top:8px;
  }
  .status.show { max-height:30px; opacity:1; padding:4px; }
  .status.ok { background:#e6f4ea; color:#137333; }
  .footer-note {
    font-size:11px; color:#80868b; padding:10px 14px 14px;
    border-top:1px solid #f1f3f4; margin-top:14px; line-height:1.5;
  }
</style>
</head>
<body>
<div class="header">
  <span class="header-icon">🔐</span>
  <span class="header-title">Base64 Decoder</span>
  <span class="header-ver">v2.0</span>
</div>
<div class="section">
  <div class="section-title">PikPak 패스워드 설정</div>
  <p class="desc">mypikpak.com 공유 링크 접속 시 패스워드를 자동 입력하고 확인 버튼을 클릭합니다.</p>
  <div class="toggle-row">
    <span class="toggle-label">자동 입력 활성화</span>
    <label class="switch">
      <input type="checkbox" id="enableToggle">
      <span class="slider"></span>
    </label>
  </div>
  <div id="pwField">
    <div class="pw-row">
      <input class="pw-input" id="pwInput" type="password" placeholder="패스워드 입력" autocomplete="off">
      <button class="eye-btn" id="eyeBtn" title="패스워드 표시/숨김">👁</button>
    </div>
    <button class="save-btn" id="saveBtn">저장</button>
    <div class="status" id="statusMsg"></div>
  </div>
</div>
<div class="footer-note">
  🔒 이 기기에만 로컬 저장됩니다.<br>
  mypikpak.com/s/… 페이지에서만 동작합니다.
</div>
<script src="popup.js"></script>
</body>
</html>
